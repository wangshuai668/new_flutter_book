workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      xcode: 15.4
    scripts:
      - name: Install unrar
        script: brew install unrar
      - name: Unzip project
        script: |
          unrar x jizhang.rar .
          ls -la
          # 自动找到 pubspec.yaml 所在的目录并进入
          cd $(find . -name pubspec.yaml -type f -exec dirname {} \; | head -n 1)
          echo "Working directory: $(pwd)"
      - name: Flutter dependencies
        script: flutter pub get
      - name: Build iOS IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/Runner.ipa
