workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      xcode: 15.4
    scripts:
      - name: Unzip project
        script: |
          # 解压你的压缩包（如果是zip用unzip，rar用unrar，这里用zip更通用）
          unrar x jizhang.rar
          # 确认项目根目录存在
          ls -la
      - name: Flutter dependencies
        script: flutter pub get
      - name: Build iOS IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/Runner.ipa
