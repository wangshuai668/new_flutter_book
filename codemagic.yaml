workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      xcode: 15.4
    scripts:
      - name: Install unrar
        script: brew install unrar
      - name: Unzip project
        script: |
          unrar x jizhang.rar .
          ls -la
          # 找到 pubspec.yaml 所在目录
          PROJECT_DIR=$(find . -name pubspec.yaml -type f -exec dirname {} \; | head -n 1)
          echo "Project directory: $PROJECT_DIR"
          # 进入目录并执行后续所有命令
          cd $PROJECT_DIR
          flutter pub get
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
